# Rename to config/active.yaml and make changes for your PR.

# Make changes here.
repo: owner/repo    # GitHub org/user and repository name
pr: 0               # Pull request number to monitor
base_branch: main   # Branch the PR targets

# Limits what the agent is allowed to change autonomously.
guardrails:
  max_files_per_fix: 10
  allow_ci_workflow_changes: false  # Never edit .github/workflows to "make green"
  allow_unrelated_changes: false    # Fixes must stay in PR scope
  auto_push: false                  # Require explicit approval before git push
  auto_merge: false                 # Require explicit approval before git merges

loop:
  mode: dynamic         # dynamic | fixed
  interval: 5m          # Fallback heartbeat for dynamic mode; cadence for fixed
  ci_poll_seconds: 30   # How often the agent polls for CI state changes in dynamic mode

notifications:
  on_blocked: true      # Escalate when human judgment is required
  on_merge_ready: true  # Notify when PR becomes merge-ready
